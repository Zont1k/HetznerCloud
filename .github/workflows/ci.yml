name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [8.0.x, 9.0.x]

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: '**/*.trx'

  pack:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore src/HetznerCloud/HetznerCloud.csproj

      - name: Build
        run: dotnet build src/HetznerCloud/HetznerCloud.csproj -c Release

      - name: Pack
        run: dotnet pack src/HetznerCloud/HetznerCloud.csproj -c Release --no-build

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: '**/*.nupkg'

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    environment: nuget
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore src/HetznerCloud/HetznerCloud.csproj

      - name: Build
        run: dotnet build src/HetznerCloud/HetznerCloud.csproj -c Release

      - name: Pack
        run: dotnet pack src/HetznerCloud/HetznerCloud.csproj -c Release --no-build

      - name: Push to NuGet
        run: dotnet nuget push "**/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate --no-symbols
